<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✦ 粒子文字生成器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --accent: #c8ff6e;
      --accent2: #6ef0ff;
      --text: #e8e8f0;
      --muted: #555570;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    header {
      width: 100%;
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e2e;
    }

    .logo {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .logo span { color: var(--accent); }

    .badge {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: 1px solid var(--muted);
      padding: 0.3rem 0.8rem;
      border-radius: 100px;
      color: var(--muted);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 900px;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .hero {
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    .hero h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
      position: relative;
    }

    .hero p {
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
    }

    /* Canvas */
    #canvas-wrap {
      width: 100%;
      background: var(--surface);
      border: 1px solid #1e1e2e;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    canvas {
      display: block;
      width: 100%;
      height: 300px;
      cursor: crosshair;
    }

    .canvas-label {
      position: absolute;
      top: 1rem;
      left: 1.2rem;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Controls */
    .controls {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      animation: fadeUp 0.8s 0.35s ease both;
    }

    .input-wrap {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid #1e1e2e;
      border-radius: 4px;
      padding: 1rem 1.2rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 4px;
      padding: 1rem 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.15s, background 0.2s;
      white-space: nowrap;
    }

    button:hover { transform: scale(1.03); background: #d8ff8e; }
    button:active { transform: scale(0.97); }

    /* Presets */
    .presets {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    .preset-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      align-self: center;
      margin-right: 0.4rem;
    }

    .preset-btn {
      background: transparent;
      border: 1px solid #2a2a3e;
      color: var(--muted);
      padding: 0.4rem 0.9rem;
      font-size: 0.75rem;
      border-radius: 100px;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      background: #1e1e2e;
      color: var(--text);
      border-color: var(--muted);
      transform: none;
    }

    /* Stats bar */
    .stats {
      width: 100%;
      display: flex;
      gap: 2rem;
      padding: 1.2rem 1.5rem;
      background: var(--surface);
      border: 1px solid #1e1e2e;
      border-radius: 4px;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .stat { display: flex; flex-direction: column; gap: 0.2rem; }
    .stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent2);
      font-family: 'Space Mono', monospace;
    }
    .stat-key {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    footer {
      padding: 2rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-top: 1px solid #1e1e2e;
      width: 100%;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">✦ <span>Particle</span>Lab</div>
  <div class="badge">Demo v1.0</div>
</header>

<main>
  <div class="hero">
    <h1>用粒子<em>书写</em>文字</h1>
    <p>输入任意词句 · 观察粒子涌现 · 鼠标悬停扰动</p>
  </div>

  <div id="canvas-wrap">
    <div class="canvas-label">PARTICLE CANVAS</div>
    <canvas id="c"></canvas>
  </div>

  <div class="controls">
    <div class="input-wrap">
      <input type="text" id="wordInput" placeholder="输入文字，比如：Hello World" maxlength="20" value="你好世界"/>
    </div>
    <button id="renderBtn">生 成 ↗</button>
  </div>

  <div class="presets">
    <span class="preset-label">预设</span>
    <button class="preset-btn">你好世界</button>
    <button class="preset-btn">DREAM</button>
    <button class="preset-btn">HELLO</button>
    <button class="preset-btn">2025</button>
    <button class="preset-btn">✦ AI ✦</button>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-val" id="statCount">0</span>
      <span class="stat-key">粒子数量</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statFrames">0</span>
      <span class="stat-key">帧率 FPS</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statLen">0</span>
      <span class="stat-key">字符长度</span>
    </div>
  </div>
</main>

<footer>github demo · 用 html + canvas + js 构建 · 可部署到 github pages</footer>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  let W, H, particles = [], mouse = { x: -999, y: -999 };
  let animId, frameCount = 0, lastFps = performance.now(), fps = 0;

  function resize() {
    W = canvas.width  = wrap.clientWidth;
    H = canvas.height = 300;
  }

  function getTextPixels(text) {
    const off = document.createElement('canvas');
    const ox = off.getContext('2d');
    off.width = W; off.height = H;
    const size = Math.min(W / (text.length * 0.7 + 1), H * 0.55);
    ox.font = `900 ${size}px 'Noto Serif SC', serif`;
    ox.fillStyle = '#fff';
    ox.textAlign = 'center';
    ox.textBaseline = 'middle';
    ox.fillText(text, W / 2, H / 2);
    const data = ox.getImageData(0, 0, W, H).data;
    const pts = [];
    const gap = 5;
    for (let y = 0; y < H; y += gap) {
      for (let x = 0; x < W; x += gap) {
        if (data[(y * W + x) * 4 + 3] > 128) {
          pts.push({ tx: x, ty: y });
        }
      }
    }
    return pts;
  }

  class Particle {
    constructor(tx, ty) {
      this.tx = tx; this.ty = ty;
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.vx = 0; this.vy = 0;
      this.hue = Math.random() > 0.5 ? 80 : 190; // lime or cyan
      this.size = Math.random() * 2 + 1;
    }
    update() {
      const dx = mouse.x - this.x, dy = mouse.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 80) {
        const force = (80 - dist) / 80;
        this.vx -= dx * force * 0.06;
        this.vy -= dy * force * 0.06;
      }
      this.vx += (this.tx - this.x) * 0.08;
      this.vy += (this.ty - this.y) * 0.08;
      this.vx *= 0.78; this.vy *= 0.78;
      this.x += this.vx; this.y += this.vy;
    }
    draw() {
      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      const bright = Math.min(70 + speed * 8, 90);
      ctx.fillStyle = `hsl(${this.hue}, 100%, ${bright}%)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function render(text) {
    cancelAnimationFrame(animId);
    particles = [];
    const pts = getTextPixels(text);
    pts.forEach(p => particles.push(new Particle(p.tx, p.ty)));
    document.getElementById('statCount').textContent = particles.length;
    document.getElementById('statLen').textContent = text.length;
    loop();
  }

  function loop() {
    ctx.fillStyle = 'rgba(18,18,26,0.25)';
    ctx.fillRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });

    frameCount++;
    const now = performance.now();
    if (now - lastFps > 500) {
      fps = Math.round(frameCount / ((now - lastFps) / 1000));
      document.getElementById('statFrames').textContent = fps;
      frameCount = 0; lastFps = now;
    }

    animId = requestAnimationFrame(loop);
  }

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    const scaleX = W / r.width;
    mouse.x = (e.clientX - r.left) * scaleX;
    mouse.y = (e.clientY - r.top);
  });
  canvas.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });

  document.getElementById('renderBtn').addEventListener('click', () => {
    const v = document.getElementById('wordInput').value.trim();
    if (v) render(v);
  });

  document.getElementById('wordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('renderBtn').click();
  });

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('wordInput').value = btn.textContent;
      render(btn.textContent);
    });
  });

  window.addEventListener('resize', () => { resize(); render(document.getElementById('wordInput').value || '你好世界'); });

  resize();
  render('你好世界');
</script>
</body>
</html>
